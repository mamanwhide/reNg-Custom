server {
    listen                                          8082 default;
    listen                                          [::]:8082 default;
    server_name                                     parakang recon;
    return                                          301 https://$host$request_uri;
}


server {
    listen                                          443 ssl;
    listen                                          [::]:443 ssl;
    http2                                           on;
    server_name                                     parakang recon;

    charset                                         utf-8;
    keepalive_timeout                               70;

    # Support large DataTables URLs (29 columns × 6 params ≈ 6.6KB query string)
    large_client_header_buffers                     4 16k;

    # SEC-06 fix: Reduced from 800M; 20M sufficient for wordlists/configs
    client_max_body_size                            20M;

    # SEC-02 fix: Security headers
    add_header Strict-Transport-Security            "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options               "nosniff" always;
    add_header X-Frame-Options                      "SAMEORIGIN" always;
    add_header Referrer-Policy                      "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection                     "1; mode=block" always;
    add_header Permissions-Policy                   "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_read_timeout                          900;
        proxy_connect_timeout                       900;
        proxy_send_timeout                          900;
        proxy_redirect                              off;

        proxy_set_header                            Host $host;
        proxy_set_header                            X-Real-IP $remote_addr;
        proxy_set_header                            X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header                            X-Forwarded-Proto $scheme;
        proxy_pass                                  http://web:8000/;
    }

    location /staticfiles/ {
        alias /usr/src/app/staticfiles/;
    }

    location /protected_media/ {
        internal;
        alias /usr/src/scan_results/;
        autoindex off;
    }

    # SEC-01 fix: Enable TLS 1.3
    ssl_protocols                                   TLSv1.2 TLSv1.3;

    ssl_certificate                                 /etc/nginx/certs/parakang.pem;                 # RSA certificate in PEM format.
    ssl_certificate_key                             /etc/nginx/certs/parakang_rsa.key;             # Secret key in PEM format.
    ssl_trusted_certificate                         /etc/nginx/certs/parakang_chain.pem;           # Certificate chain.

    ssl_ciphers                                     '!EDH:!EXP:!SHA:!DSS:EECDH+aRSA+AESGCM:EECDH+aRSA+SHA384:EECDH+aRSA+SHA256';  # Cipher suite (see https://tls.imirhil.fr/suite/ and `openssl ciphers | sed -r -e 's/:/\n/g'`).
    ssl_prefer_server_ciphers                       on;                                                 # Specifies that server ciphers should be preferred over client ciphers.

    # ssl_dhparam                                     /etc/ssl/private/dh4096.pem;                     # Diffie-Hellman server params with 4096 bits (generated using `openssl dhparam 4096 -out /etc/ssl/private/dh4096.pem`).
    ssl_ecdh_curve                                  secp384r1:X25519:prime256v1;                        # Elliptic Curve Diffie-Hellman server params.

    ssl_session_cache                               shared:SSL:10m;                                     # Create a shared cache able to store about 80000 sessions (about 4000 for 1MB storage).
    ssl_session_timeout                             5m;                                                 # Timeout before session to be dropped.
    ssl_session_tickets                             off;                                                # Disable TLS session tickets.
}
