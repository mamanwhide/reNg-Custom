services:
  db:
    restart: always
    image: "postgres:16-alpine"
    command: postgres -c max_connections=200
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - parakang_network

  redis:
    restart: always
    image: "redis:alpine"
    hostname: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - parakang_network

  celery:
    build:
      context: ./web
    restart: always
    entrypoint: /usr/src/app/celery-entrypoint.sh
    # command: celery -A paraKang worker --autoscale=${MAX_CONCURRENCY},${MIN_CONCURRENCY} -l INFO
    mem_limit: 4g
    memswap_limit: 5g
    volumes:
      - ./web:/usr/src/app
      - github_repos:/usr/src/github
      - wordlist:/usr/src/wordlist
      - scan_results:/usr/src/scan_results
      - gf_patterns:/root/.gf
      - nuclei_templates:/root/nuclei-templates
      - tool_config:/root/.config
      - static_volume:/usr/src/app/staticfiles/
    environment:
      - DEBUG=0
      - CELERY_BROKER=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DOMAIN_NAME=${DOMAIN_NAME}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - MAX_CONCURRENCY=${MAX_CONCURRENCY}
      - MIN_CONCURRENCY=${MIN_CONCURRENCY}
    depends_on:
      - db
      - redis
    networks:
      - parakang_network

  celery-beat:
    build: ./web
    restart: always
    entrypoint: /usr/src/app/beat-entrypoint.sh
    command: celery -A paraKang beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - CELERY_BROKER=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_HOST=${POSTGRES_HOST}
    depends_on:
      - db
    volumes:
      - ./web:/usr/src/app
      - github_repos:/usr/src/github
      - wordlist:/usr/src/wordlist
      - scan_results:/usr/src/scan_results
      - gf_patterns:/root/.gf
      - nuclei_templates:/root/nuclei-templates
      - tool_config:/root/.config
    networks:
      - parakang_network

  web:
    build:
      context: ./web
    entrypoint: /usr/src/app/entrypoint.sh
    restart: always
    image: docker.pkg.github.com/yogeshojha/parakang/parakang:latest
    environment:
      - DEBUG=0
      - CELERY_BROKER=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DOMAIN_NAME=${DOMAIN_NAME}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
    volumes:
      - ./web:/usr/src/app
      - github_repos:/usr/src/github
      - wordlist:/usr/src/wordlist
      - scan_results:/usr/src/scan_results
      - gf_patterns:/root/.gf
      - nuclei_templates:/root/nuclei-templates
      - tool_config:/root/.config
      - static_volume:/usr/src/app/staticfiles/
    ports:
      - "0.0.0.0:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    depends_on:
      - db
      - celery
      - celery-beat
    networks:
      parakang_network:
        aliases:
          - parakang

  proxy:
    restart: always
    image: nginx:alpine
    ports:
      - 8082:8082/tcp
      - 443:443/tcp
    depends_on:
      web:
        condition: service_healthy
      db:
        condition: service_started
      redis:
        condition: service_started
    secrets:
      - source: proxy.ca
        target: /etc/nginx/certs/parakang_chain.pem
      - source: proxy.cert
        target: /etc/nginx/certs/parakang.pem
      - source: proxy.key
        target: /etc/nginx/certs/parakang_rsa.key
    volumes:
      - ./config/nginx/parakang.conf:/etc/nginx/conf.d/parakang.conf:ro
      - static_volume:/usr/src/app/staticfiles/
      - scan_results:/usr/src/scan_results
    networks:
      - parakang_network
  ollama:
    image: ollama/ollama
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "0.0.0.0:11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_HOST=http://0.0.0.0:11434
    networks:
      - parakang_network

networks:
  parakang_network:
    driver: bridge

volumes:
  tool_config:
  postgres_data:
  gf_patterns:
  nuclei_templates:
  github_repos:
  wordlist:
  scan_results:
  static_volume:
  ollama_data:

secrets:
  proxy.ca:
    file: ./secrets/certs/parakang_chain.pem
  proxy.key:
    file: ./secrets/certs/parakang_rsa.key
  proxy.cert:
    file: ./secrets/certs/parakang.pem
